<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><title>Espaço Aylas</title><style>:root{--primary:#37254c;--lilac:#CFC1E8;--offwhite:#f5f1ea;--lightgray:#e9e7e4;--dark:#1a1520;--white:#fff;--success:#4a9d6f;--critical:#c23b22;--neutral:#999}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,"Segoe UI","Inter",sans-serif;background:var(--offwhite);color:var(--dark)}h1{font-size:clamp(1.5rem,6vw,2.5rem);color:var(--primary)}.container{max-width:600px;margin:0 auto;padding:1.5rem 1rem}.archetype-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;min-height:44px}.archetype-card{background:var(--white);border:2px solid var(--lightgray);border-radius:12px;padding:1rem}.archetype-content{max-height:0;overflow:hidden;transition:max-height .3s}.archetype-content.open{max-height:1500px}.toggle-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;transition:transform .3s}.toggle-icon.open{transform:rotate(180deg)}input{font-size:16px;padding:12px;border:1px solid var(--lightgray);border-radius:8px;width:100%;min-height:44px}button{font-family:inherit;padding:12px 1rem;border:0;border-radius:8px;cursor:pointer;min-height:44px;width:100%}.btn-primary{background:var(--primary);color:var(--white)}.btn-secondary{background:var(--lilac);color:var(--primary)}.btn-danger{background:var(--critical);color:var(--white)}</style></head><body><div class="container"><h1>Espaço Aylas</h1><form id="f"><div id="a"></div><button>Enviar</button></form></div><script>const A=[{id:"sol",name:"Painel Solar"},{id:"gato",name:"Gato"},{id:"chi",name:"Chicletes"},{id:"agi",name:"Agitado"},{id:"ant",name:"Antissocial"},{id:"ove",name:"Ovelha"},{id:"can",name:"Cantor"}];let s={};function init(){A.forEach(x=>{s[x.id]=[];const d=document.createElement("div");d.className="archetype-card";d.innerHTML="<div class="archetype-header" onclick="toggle(\"" + x.id + "\")" style="cursor:pointer"><div>" + x.name + "</div><div class="toggle-icon" id="i-" + x.id + "">▼</div></div><div class="archetype-content" id="c-" + x.id + ""><button class="btn-secondary" onclick="add(\"" + x.id + "\")" type="button">+ Cão</button></div>";document.getElementById("a").appendChild(d)})}function toggle(id){document.getElementById("c-" + id).classList.toggle("open");document.getElementById("i-" + id).classList.toggle("open")}function add(id){const e=document.createElement("div");e.innerHTML="<input placeholder="Nome" required><input placeholder="Raça"><input type="file" accept="image/*"><button class="btn-danger">X</button>";document.getElementById("c-" + id).insertBefore(e,document.getElementById("c-" + id).lastElementChild)}document.getElementById("f").addEventListener("submit",e=>{e.preventDefault();alert("Formulário pronto! Configure Apps Script URL")});init()</script></body></html>
